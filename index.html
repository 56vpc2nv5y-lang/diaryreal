<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; overflow: hidden;
    background: #1a1510;
    font-family: var(--theme-body-font, 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif);
    -webkit-font-smoothing: antialiased;
  }

  /* Center phone frame on desktop; fill on mobile */
  #root {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }
  @media (max-width: 430px) {
    html, body { background: #fff; }
    #root { display: block; }
    #root > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
    }
  }

  .serif { font-family: var(--theme-serif-font, 'Noto Serif SC', 'Songti SC', serif); }
  .diary-writing { font-family: var(--theme-writing-font, 'Noto Serif SC', 'Songti SC', serif); }
  .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scroll::-webkit-scrollbar { display: none; }
  .theme-decor {
    position: absolute;
    inset: 0;
    z-index: 2;
    overflow: hidden;
    pointer-events: none;
    color: var(--theme-decor-color, currentColor);
  }
  .theme-decor-svg {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .theme-decor-mark {
    display: none;
    position: absolute;
    font-family: var(--theme-serif-font, 'Noto Serif SC', serif);
  }
  .theme-card-motif { transition: opacity .2s ease; }
  .theme-card-motif-inkPlum circle,
  .theme-card-motif-mossGarden ellipse,
  .theme-card-motif-snowNight circle { fill: currentColor; stroke: none; }
  .theme-card-motif-morningPaper { opacity: .24 !important; }
  .theme-card-motif-seaSalt,
  .theme-card-motif-snowNight { opacity: .46 !important; }
  .theme-poem-card:hover .theme-card-motif,
  .theme-quote-card:hover .theme-card-motif { opacity: .62 !important; }
  .theme-home-header { position: relative; z-index: 4; }
  .theme-header-mark {
    min-width: 58px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    color: currentColor;
    font-family: var(--theme-serif-font, 'Noto Serif SC', serif);
  }
  .theme-header-mark span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 4px 8px;
    border: 1px solid currentColor;
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .theme-header-mark small { font-size: 8px; letter-spacing: 1px; opacity: .6; }
  .theme-header-mark-morningPaper span { border-radius: 1px; color: #b53e32; }
  .theme-header-mark-seaSalt span,
  .theme-header-mark-snowNight span { border-radius: 14px; }
  .theme-header-mark-inkPlum span { border-radius: 2px; color: #a43a2e; }
  .theme-header-mark-mossGarden span { background: rgba(73,107,75,.12); }
  .theme-header-mark-study span { border-color: rgba(103,77,51,.35); background: rgba(255,247,225,.45); }
  .theme-header-mark-dusk span { border-color: rgba(128,109,145,.3); background: rgba(255,255,255,.3); }
  .theme-header-mark-obsidianDawn span { color: #292b2a; border-color: rgba(185,139,69,.58); }
  .theme-header-mark-snowNight { color: rgba(255,255,255,.92); }

  .theme-card-art {
    position: absolute;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
    color: currentColor;
  }
  .theme-poem-card,
  .theme-quote-card,
  .theme-poem-hero,
  .theme-sign-card { isolation: isolate; }
  .theme-card-art svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .theme-card-art svg > * { display: none; }
  .theme-card-art-label { display: none; position: absolute; font-family: var(--theme-serif-font, serif); }

  .theme-card-art-celadon { color: rgba(63,118,104,.20); }
  .theme-card-art-celadon .art-line,
  .theme-card-art-celadon .art-sun { display: block; }
  .theme-card-art-celadon .art-sun { transform: translate(29px,-36px); }

  .theme-card-art-inkPlum { color: rgba(45,43,39,.42); }
  .theme-card-art-inkPlum .art-branch,
  .theme-card-art-inkPlum .art-blossoms { display: block; }
  .theme-card-art-inkPlum .art-blossoms { fill: #a43a2e; stroke: #a43a2e; }
  .theme-card-art-inkPlum.theme-card-art-poem .art-branch,
  .theme-card-art-inkPlum.theme-card-art-poem .art-blossoms { display: none; }

  .theme-card-art-mossGarden { color: rgba(54,92,62,.32); }
  .theme-card-art-mossGarden .art-leaf-stem { display: block; }
  .theme-card-art-mossGarden.theme-card-art-poem .art-leaf-stem { display: none; }

  .theme-card-art-study { color: rgba(103,77,51,.20); }
  .theme-card-art-study .art-book { display: block; transform: translate(198px,125px) scale(.72); transform-origin: center; }

  .theme-card-art-dusk { color: rgba(128,109,145,.22); }
  .theme-card-art-dusk .art-moon,
  .theme-card-art-dusk .art-line-a { display: block; }
  .theme-card-art-dusk.theme-card-art-poem .art-moon { display: none; }

  .theme-card-art-morningPaper { color: rgba(41,39,35,.20); }
  .theme-card-art-morningPaper.theme-card-art-quote .art-book { display: block; transform: translate(205px,128px) scale(.72); transform-origin: center; }
  .theme-card-art-morningPaper::after {
    content: ''; position: absolute; left: 12px; right: 12px; bottom: 12px;
    border-top: 3px double rgba(41,39,35,.30);
  }

  .theme-card-art-seaSalt { color: rgba(77,130,166,.34); }
  .theme-card-art-seaSalt .art-line { display: block; stroke-width: 1.7; }

  .theme-card-art-obsidianDawn { color: rgba(185,139,69,.40); }
  .theme-card-art-obsidianDawn .art-sun,
  .theme-card-art-obsidianDawn .art-rays { display: block; }
  .theme-card-art-obsidianDawn.theme-card-art-poem .art-sun,
  .theme-card-art-obsidianDawn.theme-card-art-poem .art-rays { display: none; }

  .theme-card-art-snowNight { color: rgba(111,131,189,.28); }
  .theme-card-art-snowNight .art-line,
  .theme-card-art-snowNight .art-snow { display: block; }
  .theme-card-art-snowNight .art-moon { display: block; transform: translate(22px,-12px) scale(.78); transform-origin: center; }
  .theme-card-art-snowNight.theme-card-art-poem .art-moon { display: none; }

  .theme-screen-inkPlum .theme-poem-card:not(.theme-preview-poem-card) {
    clip-path: polygon(0 2%, 3% 1%, 7% 2%, 12% 1%, 17% 2%, 22% 1%, 28% 2%, 34% 1%, 41% 2%, 48% 1%, 55% 2%, 63% 1%, 71% 2%, 79% 1%, 87% 2%, 94% 1%, 100% 2%, 99% 98%, 94% 99%, 87% 98%, 80% 99%, 72% 98%, 64% 99%, 55% 98%, 47% 99%, 38% 98%, 30% 99%, 22% 98%, 14% 99%, 7% 98%, 1% 99%);
  }
  .theme-screen-morningPaper .theme-home-header { border-bottom: 3px double rgba(41,39,35,.62); margin: 0 20px; padding-left: 0 !important; padding-right: 0 !important; }
  .theme-screen-morningPaper .theme-today-wrap { padding-left: 20px !important; padding-right: 20px !important; }
  .theme-screen-seaSalt .theme-poem-card:not(.theme-preview-poem-card),
  .theme-screen-snowNight .theme-poem-card:not(.theme-preview-poem-card) { border-bottom-left-radius: 46px !important; border-bottom-right-radius: 46px !important; }
  .theme-screen-obsidianDawn .theme-poem-card:not(.theme-preview-poem-card) { box-shadow: inset -3px 0 0 rgba(185,139,69,.48), 0 12px 28px rgba(41,43,42,.13) !important; }
  .theme-screen-celadon .theme-quote-card,
  .theme-screen-mossGarden .theme-quote-card { min-height: 104px; }
  .theme-screen-snowNight .theme-home-header { color: #274983; }

  .theme-home-quote { margin-top: 14px; }
  .theme-home-quote .theme-quote-card {
    position: relative;
    overflow: hidden;
    min-height: 86px;
    padding: 16px 18px;
    cursor: pointer;
  }
  .theme-home-quote-title { font-size: 11px; letter-spacing: 3px; font-weight: 600; }
  .theme-home-quote-text { margin-top: 9px; padding-right: 30px; font-size: 13.5px; line-height: 1.75; letter-spacing: .8px; }
  .theme-home-quote-arrow { position: absolute; right: 17px; top: 50%; transform: translateY(-50%); font-size: 20px; opacity: .58; }
  .theme-decor-celadon { color: rgba(63,118,104,.32); }
  .theme-decor-celadon .decor-celadon { display: block; }
  .theme-decor-celadon .mark-a {
    display: block; top: 42px; right: -28px; width: 88px; height: 88px;
    border: 1px solid rgba(63,118,104,.28); border-radius: 50%;
    box-shadow: inset 0 0 0 9px rgba(255,255,255,.12), inset 0 0 0 10px rgba(63,118,104,.12);
  }
  .theme-decor-celadon .mark-b {
    display: block; left: 14px; bottom: 104px; color: rgba(63,118,104,.52);
    font-size: 10px; letter-spacing: 5px; writing-mode: vertical-rl;
  }
  .theme-decor-celadon .mark-b::before { content: '青 瓷'; }

  .theme-decor-inkPlum { color: rgba(45,43,39,.48); }
  .theme-decor-inkPlum .decor-inkPlum { display: none; }
  .theme-decor-inkPlum .decor-inkPlum g { fill: #b43a2e; stroke: #b43a2e; opacity: .72; }
  .theme-decor-inkPlum .mark-a {
    display: block; left: 16px; bottom: 94px; width: 30px; height: 30px;
    border: 1px solid rgba(180,58,46,.55); color: rgba(180,58,46,.72);
    font-size: 12px; line-height: 28px; text-align: center;
  }
  .theme-decor-inkPlum .mark-a::before { content: '梅'; }

  .theme-decor-mossGarden { color: rgba(48,85,55,.42); }
  .theme-decor-mossGarden .decor-mossGarden { display: none; }
  .theme-decor-mossGarden .mark-a {
    display: block; top: 94px; left: -34px; width: 86px; height: 86px;
    border-radius: 46% 54% 42% 58%; background: rgba(73,107,75,.13);
    border: 1px solid rgba(48,85,55,.25); transform: rotate(22deg);
  }
  .theme-decor-mossGarden .mark-b {
    display: block; right: 13px; bottom: 98px; color: rgba(48,85,55,.58);
    font-size: 11px; letter-spacing: 4px; writing-mode: vertical-rl;
  }
  .theme-decor-mossGarden .mark-b::before { content: '苔 庭'; }

  .theme-decor-study { color: rgba(103,77,51,.28); }
  .theme-decor-study .decor-study { display: block; }
  .theme-decor-study .mark-a {
    display: block; top: 70px; right: 20px; width: 62px; height: 82px;
    border: 1px solid rgba(103,77,51,.24); border-radius: 31px 31px 8px 8px;
    background: radial-gradient(circle at 50% 38%, rgba(255,222,155,.34), transparent 58%);
  }
  .theme-decor-study .mark-b {
    display: block; left: 14px; bottom: 104px; color: rgba(103,77,51,.54);
    font-size: 10px; letter-spacing: 4px; writing-mode: vertical-rl;
  }
  .theme-decor-study .mark-b::before { content: '旧 书 房'; }

  .theme-decor-dusk { color: rgba(128,109,145,.30); }
  .theme-decor-dusk .decor-dusk { display: block; stroke-width: 1.8; }
  .theme-decor-dusk .mark-a {
    display: block; right: -48px; top: 104px; width: 132px; height: 132px;
    border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.44), rgba(128,109,145,.12) 68%, transparent 70%);
  }
  .theme-decor-dusk .mark-b {
    display: block; left: 17px; bottom: 100px; color: rgba(128,109,145,.58);
    font-size: 10px; letter-spacing: 4px;
  }
  .theme-decor-dusk .mark-b::before { content: '暮 云 · 微 光'; }

  .theme-decor-morningPaper { color: rgba(54,49,42,.25); }
  .theme-decor-morningPaper .decor-morningPaper { display: block; stroke-width: 1; }
  .theme-decor-morningPaper .mark-a {
    display: block; top: 54px; right: 18px; width: 32px; padding: 5px 0;
    border: 1px solid rgba(181,62,50,.75); color: #b53e32;
    font-size: 12px; line-height: 1.3; text-align: center; font-weight: 600;
  }
  .theme-decor-morningPaper .mark-a::before { content: '晨\A报'; white-space: pre; }
  .theme-decor-morningPaper .mark-b {
    display: block; left: 22px; bottom: 98px; color: rgba(54,49,42,.56);
    font-size: 9px; letter-spacing: 2px; border-top: 1px solid rgba(54,49,42,.32); padding-top: 5px;
  }
  .theme-decor-morningPaper .mark-b::before { content: 'DAILY · 今日号'; }

  .theme-decor-seaSalt { color: rgba(45,105,145,.48); }
  .theme-decor-seaSalt .decor-seaSalt { display: block; stroke-width: 2; }
  .theme-decor-seaSalt .mark-a {
    display: block; top: 56px; right: 12px; color: rgba(45,105,145,.62);
    font-size: 10px; line-height: 1.55; letter-spacing: 3px; writing-mode: vertical-rl;
  }
  .theme-decor-seaSalt .mark-a::before { content: 'SEA · SALT'; }
  .theme-decor-seaSalt .mark-b {
    display: block; left: -22px; bottom: 72px; width: 120px; height: 42px;
    border-top: 2px solid rgba(77,130,166,.34); border-radius: 50%;
  }

  .theme-decor-obsidianDawn { color: rgba(41,43,42,.38); }
  .theme-decor-obsidianDawn .decor-obsidianDawn { display: block; stroke-width: 1.6; }
  .theme-decor-obsidianDawn .decor-obsidianDawn circle { stroke: rgba(185,139,69,.65); }
  .theme-decor-obsidianDawn .decor-obsidianDawn path { fill: none; }
  .theme-decor-obsidianDawn .mark-a {
    display: none;
  }
  .theme-decor-obsidianDawn .mark-b {
    display: block; right: 16px; bottom: 98px; color: rgba(41,43,42,.64);
    font-size: 10px; letter-spacing: 4px; writing-mode: vertical-rl;
  }
  .theme-decor-obsidianDawn .mark-b::before { content: '曜 石 晨 光'; }

  .theme-decor-snowNight { color: rgba(255,255,255,.72); }
  .theme-decor-snowNight .decor-snowNight { display: block; stroke-width: 1.8; }
  .theme-decor-snowNight .decor-snowNight circle:first-child { fill: rgba(255,255,255,.40); stroke: rgba(255,255,255,.58); }
  .theme-decor-snowNight .decor-snowNight circle:nth-child(2) { fill: #aebce1; stroke: #aebce1; }
  .theme-decor-snowNight .mark-a,
  .theme-decor-snowNight .mark-b,
  .theme-decor-snowNight .mark-c {
    display: block; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.86);
    box-shadow: 24px 16px 0 rgba(255,255,255,.62), 52px -9px 0 rgba(255,255,255,.78), 81px 21px 0 rgba(255,255,255,.54), 112px 0 0 rgba(255,255,255,.76);
  }
  .theme-decor-snowNight .mark-a { top: 84px; left: 28px; }
  .theme-decor-snowNight .mark-b { top: 284px; right: 132px; transform: rotate(17deg); }
  .theme-decor-snowNight .mark-c { bottom: 154px; left: 80px; transform: rotate(-11deg); }

  @keyframes anim-rise-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-rise > * { animation: anim-rise-in 0.8s ease-out backwards; }
  .anim-rise > *:nth-child(1) { animation-delay: .1s; }
  .anim-rise > *:nth-child(2) { animation-delay: .3s; }
  .anim-rise > *:nth-child(3) { animation-delay: .5s; }
  .anim-rise > *:nth-child(4) { animation-delay: .7s; }
  .anim-rise > *:nth-child(5) { animation-delay: .9s; }

  @keyframes shake-tilt {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-2deg) translateY(-2px); }
    40% { transform: rotate(2deg) translateY(2px); }
    60% { transform: rotate(-1.5deg); }
    80% { transform: rotate(1deg); }
  }
  .anim-shake { animation: shake-tilt 0.55s ease-in-out infinite; }

  /* Desktop layout: same app and data, roomier navigation and writing canvas. */
  @media (min-width: 900px) {
    html, body { background: #e7e2d8; }
    #root { align-items: stretch; }
    #root > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
    }

    .app-screen { border-radius: 0; }
    .app-screen:not(.app-screen-no-tab) .app-scroll {
      left: 112px !important;
      right: 28px !important;
      max-width: 1040px;
      margin-left: auto;
      margin-right: auto;
    }
    .app-screen-no-tab .app-scroll {
      left: 28px !important;
      right: 28px !important;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      border-left: 0.5px solid rgba(80,70,60,.08);
      border-right: 0.5px solid rgba(80,70,60,.08);
    }
    .app-tabbar {
      top: 0 !important;
      right: auto !important;
      bottom: 0 !important;
      width: 88px !important;
      height: 100% !important;
      padding: 28px 12px !important;
      flex-direction: column;
      justify-content: center !important;
      gap: 18px;
      background: rgba(255,255,255,.28);
      border-right: 0.5px solid rgba(80,70,60,.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .app-tab-item {
      width: 64px;
      min-height: 52px;
      border-radius: 18px !important;
      transition: background .18s, transform .18s;
    }
    .app-tab-item:hover { background: rgba(255,255,255,.48) !important; transform: translateY(-1px); }
    .app-tab-primary { margin: 6px 0; }
    .home-indicator { display: none !important; }

    .compose-screen { width: 100vw !important; height: 100dvh !important; }
    .compose-paper-bg {
      left: 50% !important;
      right: auto !important;
      width: min(820px, 100vw) !important;
      transform: translateX(-50%);
      box-shadow: 0 0 50px rgba(72,61,48,.10);
    }
    .compose-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(72,61,48,.08);
    }
    .paper-picker-sheet {
      max-width: 900px !important;
      max-height: 82vh !important;
      border-radius: 24px 24px 0 0 !important;
    }
    .compose-focus-toggle { display: inline-flex !important; align-items: center; }
    .theme-decor {
      left: 50%;
      right: auto;
      width: min(1100px, 100vw);
      transform: translateX(-50%);
    }
  }
  .compose-focus-toggle { display: none; }

  @media (min-width: 1100px) {
    .compose-paper-bg { width: 1120px !important; }
    .compose-shell {
      width: 100%;
      max-width: none;
      display: grid !important;
      grid-template-columns: 250px minmax(0, 780px);
      grid-template-rows: 56px auto minmax(0, 1fr) auto auto;
      justify-content: center;
      column-gap: 30px;
      padding: 24px 32px 28px;
      box-shadow: none;
    }
    .compose-topbar {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0 8px !important;
    }
    .compose-meta {
      grid-column: 1;
      grid-row: 2 / 4;
      align-self: start;
      padding: 22px 18px !important;
      margin-top: 14px;
      border-radius: 22px;
      background: rgba(255,253,247,.72);
      border: 0.5px solid rgba(80,70,60,.12);
      box-shadow: 0 12px 34px rgba(72,61,48,.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .compose-meta .no-scroll {
      flex-wrap: wrap;
      overflow: visible !important;
    }
    .compose-title {
      grid-column: 2;
      grid-row: 2;
      padding: 16px 28px 0 !important;
    }
    .compose-title input { font-size: 28px !important; }
    .compose-body {
      grid-column: 2;
      grid-row: 3;
      padding: 18px 28px 0 !important;
    }
    .compose-body textarea { font-size: 18px !important; line-height: 2 !important; }
    .compose-error { grid-column: 2; grid-row: 4; }
    .compose-actions {
      grid-column: 1 / -1;
      grid-row: 5;
      width: min(1060px, 100%);
      margin: 0 auto !important;
      padding: 10px 18px !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .paper-picker-sheet {
      border-radius: 24px !important;
      margin-bottom: 28px;
    }
    .compose-focus .compose-shell {
      grid-template-columns: minmax(0, 900px);
    }
    .compose-focus .compose-meta { display: none; }
    .compose-focus .compose-title,
    .compose-focus .compose-body,
    .compose-focus .compose-error,
    .compose-focus .compose-actions {
      grid-column: 1;
