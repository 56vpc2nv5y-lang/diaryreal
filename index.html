<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; overflow: hidden;
    background: #1a1510;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Center phone frame on desktop; fill on mobile */
  #root {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }
  @media (max-width: 430px) {
    html, body { background: #fff; }
    #root { display: block; }
    #root > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
    }
  }

  .serif { font-family: 'Noto Serif SC', 'Songti SC', serif; }
  .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scroll::-webkit-scrollbar { display: none; }

  @keyframes anim-rise-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-rise > * { animation: anim-rise-in 0.8s ease-out backwards; }
  .anim-rise > *:nth-child(1) { animation-delay: .1s; }
  .anim-rise > *:nth-child(2) { animation-delay: .3s; }
  .anim-rise > *:nth-child(3) { animation-delay: .5s; }
  .anim-rise > *:nth-child(4) { animation-delay: .7s; }
  .anim-rise > *:nth-child(5) { animation-delay: .9s; }

  @keyframes shake-tilt {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-2deg) translateY(-2px); }
    40% { transform: rotate(2deg) translateY(2px); }
    60% { transform: rotate(-1.5deg); }
    80% { transform: rotate(1deg); }
  }
  .anim-shake { animation: shake-tilt 0.55s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
