<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; overflow: hidden;
    background: #1a1510;
    font-family: var(--theme-body-font, 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif);
    -webkit-font-smoothing: antialiased;
  }

  /* Center phone frame on desktop; fill on mobile */
  #root {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }
  @media (max-width: 430px) {
    html, body { background: #fff; }
    #root { display: block; }
    #root > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
    }
  }

  .serif { font-family: var(--theme-serif-font, 'Noto Serif SC', 'Songti SC', serif); }
  .diary-writing { font-family: var(--theme-writing-font, 'Noto Serif SC', 'Songti SC', serif); }
  .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scroll::-webkit-scrollbar { display: none; }

  @keyframes anim-rise-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-rise > * { animation: anim-rise-in 0.8s ease-out backwards; }
  .anim-rise > *:nth-child(1) { animation-delay: .1s; }
  .anim-rise > *:nth-child(2) { animation-delay: .3s; }
  .anim-rise > *:nth-child(3) { animation-delay: .5s; }
  .anim-rise > *:nth-child(4) { animation-delay: .7s; }
  .anim-rise > *:nth-child(5) { animation-delay: .9s; }

  @keyframes shake-tilt {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-2deg) translateY(-2px); }
    40% { transform: rotate(2deg) translateY(2px); }
    60% { transform: rotate(-1.5deg); }
    80% { transform: rotate(1deg); }
  }
  .anim-shake { animation: shake-tilt 0.55s ease-in-out infinite; }

  /* Desktop layout: same app and data, roomier navigation and writing canvas. */
  @media (min-width: 900px) {
    html, body { background: #e7e2d8; }
    #root { align-items: stretch; }
    #root > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
    }

    .app-screen { border-radius: 0; }
    .app-screen:not(.app-screen-no-tab) .app-scroll {
      left: 112px !important;
      right: 28px !important;
      max-width: 1040px;
      margin-left: auto;
      margin-right: auto;
    }
    .app-screen-no-tab .app-scroll {
      left: 28px !important;
      right: 28px !important;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      border-left: 0.5px solid rgba(80,70,60,.08);
      border-right: 0.5px solid rgba(80,70,60,.08);
    }
    .app-tabbar {
      top: 0 !important;
      right: auto !important;
      bottom: 0 !important;
      width: 88px !important;
      height: 100% !important;
      padding: 28px 12px !important;
      flex-direction: column;
      justify-content: center !important;
      gap: 18px;
      background: rgba(255,255,255,.28) !important;
      border-right: 0.5px solid rgba(80,70,60,.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .app-tab-item {
      width: 64px;
      min-height: 52px;
      border-radius: 18px !important;
      transition: background .18s, transform .18s;
    }
    .app-tab-item:hover { background: rgba(255,255,255,.48) !important; transform: translateY(-1px); }
    .app-tab-primary { margin: 6px 0; }
    .home-indicator { display: none !important; }

    .compose-screen { width: 100vw !important; height: 100dvh !important; }
    .compose-paper-bg {
      left: 50% !important;
      right: auto !important;
      width: min(820px, 100vw) !important;
      transform: translateX(-50%);
      box-shadow: 0 0 50px rgba(72,61,48,.10);
    }
    .compose-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(72,61,48,.08);
    }
    .paper-picker-sheet {
      max-width: 900px !important;
      max-height: 82vh !important;
      border-radius: 24px 24px 0 0 !important;
    }
  }

  @media (min-width: 1100px) {
    .compose-paper-bg { width: 1120px !important; }
    .compose-shell {
      width: 100%;
      max-width: none;
      display: grid !important;
      grid-template-columns: 250px minmax(0, 780px);
      grid-template-rows: 56px auto minmax(0, 1fr) auto auto;
      justify-content: center;
      column-gap: 30px;
      padding: 24px 32px 28px;
      box-shadow: none;
    }
    .compose-topbar {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0 8px !important;
    }
    .compose-meta {
      grid-column: 1;
      grid-row: 2 / 4;
      align-self: start;
      padding: 22px 18px !important;
      margin-top: 14px;
      border-radius: 22px;
      background: rgba(255,253,247,.72);
      border: 0.5px solid rgba(80,70,60,.12);
      box-shadow: 0 12px 34px rgba(72,61,48,.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .compose-meta .no-scroll {
      flex-wrap: wrap;
      overflow: visible !important;
    }
    .compose-title {
      grid-column: 2;
      grid-row: 2;
      padding: 16px 28px 0 !important;
    }
    .compose-title input { font-size: 28px !important; }
    .compose-body {
      grid-column: 2;
      grid-row: 3;
      padding: 18px 28px 0 !important;
    }
    .compose-body textarea { font-size: 18px !important; line-height: 2 !important; }
    .compose-error { grid-column: 2; grid-row: 4; }
    .compose-actions {
      grid-column: 1 / -1;
      grid-row: 5;
      width: min(1060px, 100%);
      margin: 0 auto !important;
      padding: 10px 18px !important;
      border-radius: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .paper-picker-sheet {
      border-radius: 24px !important;
      margin-bottom: 28px;
    }
  }
  .theme-picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(104px, 126px));
    justify-content: start;
    gap: 12px;
    padding: 14px 16px 16px;
  }
  .theme-card-preview {
    aspect-ratio: 1.18 / 1;
    min-height: 86px;
  }
  @media (max-width: 520px) {
    .theme-picker-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      padding: 12px;
    }
    .theme-card-preview {
      min-height: 76px;
      aspect-ratio: 1.08 / 1;
    }
  }
</style>

    html[data-diary-theme="obsidianDawn"] {

    html[data-diary-theme="snowNight"] {

      --theme-control-radius: 18px;

    html[data-diary-theme="morningPaper"] :is(button, input, textarea, select) {

    html[data-diary-theme="seaSalt"] :is(button, input, select) {

    html[data-diary-theme="seaSalt"] :is([class*="card"], [class*="panel"]) {

    }
    html[data-diary-theme="obsidianDawn"] :is(button, input, select) {
      border-radius: var(--theme-control-radius) !important;
    }
    html[data-diary-theme="obsidianDawn"] :is([class*="card"], [class*="panel"]) {
      border-radius: var(--theme-card-radius) !important;

    }
    html[data-diary-theme="snowNight"] :is(button, input, select) {

    }
    html[data-diary-theme="snowNight"] :is([class*="card"], [class*="panel"]) {
      border-radius: var(--theme-card-radius) !important;
      box-shadow: var(--theme-card-shadow) !important;
    }
  </style>
