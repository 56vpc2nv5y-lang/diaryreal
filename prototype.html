<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>日记 · Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f0eee9;
    color: #29261b;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
  .serif { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif; }
  .hand { font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif; }
  /* hide scrollbars inside frames */
  .no-scroll::-webkit-scrollbar { display: none; }
  .no-scroll { scrollbar-width: none; }
  /* shake keyframes */
  @keyframes shake-tilt {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-2deg) translateY(-2px); }
    40% { transform: rotate(2deg) translateY(2px); }
    60% { transform: rotate(-1.5deg); }
    80% { transform: rotate(1deg); }
  }
  .anim-shake { animation: shake-tilt 0.5s ease-in-out infinite; }
  @keyframes ink-rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim-rise > * { animation: ink-rise 0.8s ease-out backwards; }
  .anim-rise > *:nth-child(1) { animation-delay: 0.1s; }
  .anim-rise > *:nth-child(2) { animation-delay: 0.3s; }
  .anim-rise > *:nth-child(3) { animation-delay: 0.5s; }
  .anim-rise > *:nth-child(4) { animation-delay: 0.7s; }
  .anim-rise > *:nth-child(5) { animation-delay: 0.9s; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-other.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
